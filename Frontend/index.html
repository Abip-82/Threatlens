<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ThreatLens</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0a2e;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #7c5cbf;
    }

    h1 {
      font-size: 3rem;
      color: #7c5cbf;
      margin-bottom: 1.5rem;
      letter-spacing: 4px;
    }

    p {
      font-size: 0.75rem;
      margin-bottom: 0.5rem;
      color: #7c5cbf;
    }

    input {
      width: 360px;
      padding: 12px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      background: #f5e6c8;
      border: 2px solid #7c5cbf;
      border-radius: 4px;
      color: #333;
      margin-bottom: 1rem;
      outline: none;
    }

    button {
      padding: 10px 28px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      background: #1a0a2e;
      color: #7c5cbf;
      border: 2px solid #7c5cbf;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    button:hover {
      background: #7c5cbf;
      color: #1a0a2e;
    }

    #result {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: #a084d8;
      text-align: center;
      line-height: 2;
    }
  </style>
</head>
<body>
  <h1>ThreatLens</h1>
  <p>Phishing detector</p>
  <p>Enter suspicious link here</p>
  <br>
  <input type="text" id="urlInput" placeholder="Input your link" />
  <button onclick="analyze()">Analyze</button>
  <div id="result"></div>

  <script>
    async function analyze() {
      const url = document.getElementById('urlInput').value;
      const res = await fetch('http://127.0.0.1:5000/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
      });
      const data = await res.json();
      document.getElementById('result').innerText = `${data.verdict} \n Risk Score: ${data.risk_score}\n\n` + data.reasons.join('\n');
    }
  </script> 
</body>
</html>
